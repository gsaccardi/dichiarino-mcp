name: Bug Report
description: Report incorrect fiscal calculations or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.
        For fiscal calculation issues, include the specific values used.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: tool-call
    attributes:
      label: Tool / Input Used
      description: Which MCP tool? What input values?
      placeholder: |
        Tool: calcola_irpef
        Input: reddito_complessivo=30000, anno=2024
        Got: ...
        Expected: ...

  - type: input
    id: version
    attributes:
      label: Dichiarino version
      placeholder: "0.1.0"
