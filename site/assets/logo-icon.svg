<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2744"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <linearGradient id="doc2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dce8fc"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="3" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg2)"/>

  <!-- Subtle ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="white" stroke-width="0.5" opacity="0.05"/>

  <!-- Document body -->
  <rect x="52" y="38" width="82" height="104" rx="8" ry="8"
        fill="url(#doc2)" filter="url(#shadow2)"/>

  <!-- Folded corner -->
  <polygon points="110,38 134,62 110,62" fill="#c2d5f0"/>
  <polygon points="110,38 134,38 134,62" fill="#a0bce0"/>

  <!-- "730" label on doc -->
  <text x="70" y="72"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="16" font-weight="700" fill="#0d2240" letter-spacing="2">730</text>

  <!-- Form lines -->
  <rect x="62" y="80" width="52" height="3.5" rx="1.75" fill="#4a7fcb" opacity="0.45"/>
  <rect x="62" y="91" width="42" height="3.5" rx="1.75" fill="#4a7fcb" opacity="0.38"/>
  <rect x="62" y="102" width="52" height="3.5" rx="1.75" fill="#4a7fcb" opacity="0.45"/>
  <rect x="62" y="113" width="36" height="3.5" rx="1.75" fill="#4a7fcb" opacity="0.38"/>

  <!-- Green checkmark badge -->
  <circle cx="120" cy="126" r="22" fill="#009246" filter="url(#glow2)"/>
  <circle cx="120" cy="126" r="22" fill="none" stroke="white" stroke-width="1.5" opacity="0.25"/>
  <polyline points="109,126 118,136 132,114"
            fill="none" stroke="white" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Italian tricolor arc at bottom -->
  <path d="M 30,170 A 80,80 0 0 0 82,184" fill="none" stroke="#009246" stroke-width="5" stroke-linecap="round"/>
  <path d="M 82,184 A 80,80 0 0 0 118,184" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 118,184 A 80,80 0 0 0 170,170" fill="none" stroke="#ce2b37" stroke-width="5" stroke-linecap="round"/>

  <!-- "D" monogram watermark background (very subtle) -->
  <!-- Golden sparkle top right -->
  <g transform="translate(148, 38)" opacity="0.75" filter="url(#glow2)">
    <path d="M7,0 L8.5,5.5 L14,7 L8.5,8.5 L7,14 L5.5,8.5 L0,7 L5.5,5.5 Z" fill="#fbbf24"/>
  </g>
  <circle cx="162" cy="56" r="2" fill="#60a5fa" opacity="0.5"/>
  <circle cx="155" cy="64" r="1.2" fill="#fbbf24" opacity="0.4"/>
</svg>
